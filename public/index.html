<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Brasil na Copa do Mundo 2022</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Brasil na Copa do Mundo 2022</h1>
        <img src="img/cbf-logo.png" alt="Logo da CBF" class="bandeira">
        <nav>
            <button onclick="mostrarSecao('jogadores')">Convocados</button>
            <button onclick="mostrarSecao('jogos')">Jogos</button>
            <button onclick="mostrarSecao('eventos')">Gols e Assistências</button>
        </nav>
    </header>

    <main>
        <section id="jogadores" class="secao">
            <h2>Jogadores Convocados</h2>
            <div id="lista-jogadores" class="lista"></div>
        </section>

        <section id="jogos" class="secao" style="display: none;">
            <h2>Jogos do Brasil</h2>
            <div id="lista-jogos" class="lista"></div>
        </section>

        <section id="eventos" class="secao" style="display: none;">
            <h2>Gols, Assistências e Pênaltis</h2>
            <div class="sub-abas">
                <button onclick="mostrarAbaEventos('normal')" class="aba-ativa" id="aba-normal">Gols e
                    Assistências</button>
                <button onclick="mostrarAbaEventos('penaltis')" id="aba-penaltis">Disputa de Pênaltis</button>
            </div>
            <div id="lista-eventos" class="lista"></div>
        </section>

        <aside>
            <img src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/72x72/26bd.png" alt="Bola de futebol"
                class="bola">
            <p>Curiosidade: o Brasil terminou a Copa do Mundo de 2022 na 7ª colocação, eliminado nas quartas de final
                pela Croácia.</p>
        </aside>
    </main>

    <footer>
        <p>Desenvolvido por: <strong>Eduardo Barzotto Iritsu</strong></p>
        <p>2º Bimestre - Desenvolvimento Web</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
